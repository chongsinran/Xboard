services:
  web:
    image: ghcr.io/cedar2025/xboard:new
    environment:
      - docker=true
      # Apple App Store Server API credentials for BiLink In-App Purchases.
      # Replace the placeholder values before deployment.
      - APPLE_IAP_BUNDLE_ID=com.bilink.bilinklink.pass
      - APPLE_IAP_ISSUER_ID=YOUR_APP_STORE_CONNECT_ISSUER_ID
      - APPLE_IAP_KEY_ID=YOUR_APP_STORE_CONNECT_KEY_ID
      - APPLE_IAP_PRIVATE_KEY_PATH=/run/secrets/apple_iap_key.p8
      # Enable only when every request reaches Xboard through trusted Cloudflare.
      - APPLE_IAP_TRUST_CF_COUNTRY_HEADER=false
    volumes:
      - redis-socket:/run/redis
      - ./:/www/
      # Put the App Store Connect private key at ./secrets/AuthKey.p8.
      - ./secrets/AuthKey.p8:/run/secrets/apple_iap_key.p8:ro
    depends_on:
      - redis
    network_mode: host
    command: >
      sh -lc "php scripts/patch_ios_admin_bundle.php &&
      php scripts/patch_free_node_admin_bundle.php &&
      php scripts/patch_user_panel_admin_bundle.php &&
      exec php artisan octane:start --port=7001 --host=0.0.0.0"
    restart: always
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@file_get_contents('http://127.0.0.1:7001/api/v1/guest/comm/config') === false ? 1 : 0);"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
  horizon:
    image: ghcr.io/cedar2025/xboard:new
    volumes:
      - redis-socket:/run/redis
      - ./:/www/
    restart: always
    network_mode: host
    entrypoint: ["php", "artisan"]
    command:
      - "queue:work"
      - "redis"
      - "--queue=traffic_fetch,stat,user_alive_sync,default,order_handle,send_email,send_telegram,send_email_mass,node_sync"
      - "--sleep=3"
      - "--tries=3"
      - "--timeout=60"
      - "--memory=256"
    depends_on:
      - redis
  ws-server:
    image: ghcr.io/cedar2025/xboard:new
    volumes:
      - redis-socket:/run/redis
      - ./:/www/
    restart: always
    network_mode: host
    command: php artisan ws-server start
    depends_on:
      - redis
  personal-notice-ws:
    image: ghcr.io/cedar2025/xboard:new
    volumes:
      - redis-socket:/run/redis
      - ./:/www/
    restart: always
    network_mode: host
    command: php artisan personal-notice-ws start --host=127.0.0.1 --port=8077
    depends_on:
      - redis
  redis:
    image: redis:7-alpine
    command: redis-server --dir /data --unixsocket /run/redis/redis.sock --unixsocketperm 777
    restart: unless-stopped
    volumes:
      - redis-data:/data
      - redis-socket:/run/redis
    sysctls:
      net.core.somaxconn: 1024

volumes:
  redis-data:
  redis-socket:
